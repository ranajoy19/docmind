<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocMind</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 24px;
      background: #fff;
      border-bottom: 0.5px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 16px; font-weight: 500; }
    header span { font-size: 12px; color: #888; }

    .upload-bar {
      background: #fff;
      border-bottom: 0.5px solid #e0e0e0;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .upload-bar label {
      font-size: 13px;
      color: #555;
      white-space: nowrap;
    }

    #file-input { display: none; }

    .btn-upload {
      font-size: 13px;
      padding: 6px 14px;
      border: 0.5px solid #ccc;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      color: #1a1a1a;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-upload:hover { background: #f5f5f3; }

    #upload-status {
      font-size: 12px;
      color: #888;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-ok   { color: #0f6e56; }
    .status-err  { color: #a32d2d; }
    .status-wait { color: #854f0b; }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .msg.user {
      align-self: flex-end;
      background: #1a1a1a;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.bot {
      align-self: flex-start;
      background: #fff;
      border: 0.5px solid #e0e0e0;
      border-bottom-left-radius: 4px;
      color: #1a1a1a;
    }

    .msg.thinking {
      align-self: flex-start;
      background: #fff;
      border: 0.5px solid #e0e0e0;
      border-bottom-left-radius: 4px;
      color: #888;
      font-style: italic;
    }

    .sources {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 0.5px solid #e8e8e8;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .source-chip {
      font-size: 11px;
      padding: 2px 8px;
      background: #f0f0ee;
      border-radius: 20px;
      color: #555;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #aaa;
      gap: 8px;
      pointer-events: none;
    }

    .empty-state p { font-size: 14px; }
    .empty-state span { font-size: 12px; }

    .input-bar {
      background: #fff;
      border-top: 0.5px solid #e0e0e0;
      padding: 12px 24px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #question-input {
      flex: 1;
      font-size: 14px;
      padding: 10px 14px;
      border: 0.5px solid #ccc;
      border-radius: 8px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      min-height: 42px;
      max-height: 120px;
      background: #fff;
      color: #1a1a1a;
    }

    #question-input:focus { border-color: #888; }

    #send-btn {
      padding: 10px 18px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn:hover:not(:disabled) { opacity: 0.85; }

    @media (prefers-color-scheme: dark) {
      body { background: #1c1c1c; color: #e8e8e8; }
      header, .upload-bar, .input-bar { background: #242424; border-color: #333; }
      .btn-upload { background: #2e2e2e; border-color: #444; color: #e8e8e8; }
      .btn-upload:hover { background: #333; }
      .msg.bot { background: #2a2a2a; border-color: #3a3a3a; color: #e8e8e8; }
      .msg.thinking { background: #2a2a2a; border-color: #3a3a3a; }
      .source-chip { background: #333; color: #aaa; }
      .sources { border-color: #3a3a3a; }
      #question-input { background: #2e2e2e; border-color: #444; color: #e8e8e8; }
      #question-input:focus { border-color: #666; }
      #send-btn { background: #e8e8e8; color: #1a1a1a; }
      .empty-state { color: #555; }
    }
  </style>
</head>
<body>

<header>
  <h1>DocMind</h1>
  <span>RAG-powered document Q&amp;A</span>
</header>

<div class="upload-bar">
  <label>Document</label>
  <button class="btn-upload" onclick="document.getElementById('file-input').click()">
    Choose PDF
  </button>
  <input type="file" id="file-input" accept=".pdf" onchange="uploadFile(this)"/>
  <span id="upload-status">No document loaded</span>
</div>

<div class="chat-area" id="chat-area">
  <div class="empty-state" id="empty-state">
    <p>Upload a PDF to get started</p>
    <span>Then ask any question about your document</span>
  </div>
</div>

<div class="input-bar">
  <textarea
    id="question-input"
    placeholder="Ask a question about your document..."
    rows="1"
    onkeydown="handleKey(event)"
    oninput="autoResize(this)"
  ></textarea>
  <button id="send-btn" onclick="sendQuestion()" disabled>Send</button>
</div>

<script>
  let documentLoaded = false;

  function setStatus(msg, type) {
    const el = document.getElementById('upload-status');
    el.textContent = msg;
    el.className = type ? `status-${type}` : '';
  }

  async function uploadFile(input) {
    const file = input.files[0];
    if (!file) return;
    setStatus(`Uploading ${file.name}...`, 'wait');

    const form = new FormData();
    form.append('file', file);

    try {
      const res  = await fetch('/ingest', { method: 'POST', body: form });
      const data = await res.json();

      if (!res.ok) {
        setStatus(`Error: ${data.detail}`, 'err');
        return;
      }

      setStatus(
        `${data.file} — ${data.chunks_stored} chunks stored`,
        'ok'
      );
      documentLoaded = true;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('empty-state')?.remove();
      addMessage('bot', `Document ready. I've indexed <strong>${data.chunks_stored}</strong> passages from <strong>${data.file}</strong>. Ask me anything about it.`);
    } catch (e) {
      setStatus('Upload failed — is the server running?', 'err');
    }

    input.value = '';
  }

  async function sendQuestion() {
    const input = document.getElementById('question-input');
    const question = input.value.trim();
    if (!question || !documentLoaded) return;

    input.value = '';
    autoResize(input);
    document.getElementById('send-btn').disabled = true;

    addMessage('user', question);
    const thinking = addMessage('thinking', 'Thinking...');

    try {
      const res  = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });
      const data = await res.json();

      thinking.remove();

      if (!res.ok) {
        addMessage('bot', `Error: ${data.detail}`);
        return;
      }

      addBotMessage(data.answer, data.sources);
    } catch (e) {
      thinking.remove();
      addMessage('bot', 'Request failed — is the server running?');
    }

    document.getElementById('send-btn').disabled = false;
  }

  function addMessage(type, html) {
    const chat = document.getElementById('chat-area');
    const div  = document.createElement('div');
    div.className = `msg ${type}`;
    div.innerHTML = html;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function addBotMessage(answer, sources) {
    const chat = document.getElementById('chat-area');
    const div  = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = answer.replace(/\n/g, '<br>');

    if (sources && sources.length) {
      const sourceDiv = document.createElement('div');
      sourceDiv.className = 'sources';
      sources.forEach(s => {
        const chip = document.createElement('span');
        chip.className = 'source-chip';
        chip.textContent = `${s.source} · chunk ${s.chunk_index} · ${s.distance}`;
        sourceDiv.appendChild(chip);
      });
      div.appendChild(sourceDiv);
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
</script>
</body>
</html>
